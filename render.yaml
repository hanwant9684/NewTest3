services:
  - type: web
    name: telegram-bot
    runtime: python
    plan: free
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --worker-class gthread --timeout 120 --max-requests 500 --max-requests-jitter 25 --worker-tmp-dir /dev/shm --preload server:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: RENDER
        value: "true"
      - key: WEB_CONCURRENCY
        value: "1"
